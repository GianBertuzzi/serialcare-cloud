services:
  postgres:
    image: postgres:16-alpine
    container_name: serialcare-postgres
    environment:
      POSTGRES_DB: serialcare_db
      POSTGRES_USER: serialcare_user
      POSTGRES_PASSWORD: serialcare_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serialcare_user -d serialcare_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: serialcare-backend:1.0.0
    build:
      context: ./backend
    container_name: serialcare-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://serialcare_user:serialcare_pass@postgres:5432/serialcare_db
      JWT_SECRET: cambiar_este_secreto_en_nube
      FRONTEND_URL: http://localhost:8080,http://localhost:5173
      AZURE_STORAGE_CONNECTION_STRING: ""
      AZURE_STORAGE_CONTAINER: evidencias
      AZURE_STORAGE_PUBLIC_BASE_URL: ""
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: serialcare-frontend:1.0.0
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: serialcare-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data: