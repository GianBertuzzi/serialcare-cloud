services:
  backend:
    image: serialcare-backend:1.0.0
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: serialcare-frontend:1.0.0
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped